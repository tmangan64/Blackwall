# SOPS configuration
# Add the host's SSH key converted to age format:
#   ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub

keys:
  - &blackwall age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

creation_rules:
  - path_regex: secrets/secrets\.yaml$
    key_groups:
      - age:
          - *blackwall
